name: Check

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            rust \
            gtk4 \
            gtk4-layer-shell \
            pkg-config \
            base-devel

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose
